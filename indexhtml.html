<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>おかしな電卓 step 4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app" class="container mt-5">
    <h1 class="mb-4">答が間違ってると計算しない電卓 ステップ４</h1>

		<!-- ここに入力フォームが入ります（Step 2） -->
		<!-- index.html の #app の中に追加 -->
		<div class="row mb-3">
			<div class="col">
				<input type="number" class="form-control" v-model.number="num1" placeholder="数字1">
			</div>
			<div class="col">
				<select class="form-select" v-model="operator">
					<option value="+">＋</option>
					<option value="-">−</option>
					<option value="*">×</option>
					<option value="/">÷</option>
				</select>
			</div>
			<div class="col">
				<input type="number" class="form-control" v-model.number="num2" placeholder="数字2">
			</div>
		</div>

		<div class="row mb-3">
			<div class="col">
				<label>=</label>
				<input type="number" class="form-control" v-model.number="userAnswer" placeholder="答えを入力">
			</div>
		</div>

		<!-- ここに計算ボタンが入ります（Step 4） -->
		<div class="row mb-3">
			<div class="col">
				<button class="btn btn-primary" @click="checkAnswer">計算</button>
			</div>
		</div>

		<div class="alert" :class="{'alert-success': isCorrect, 'alert-danger': !isCorrect}" role="alert" v-if="message">
			{{ message }}
		</div>
		
  </div>

  <!-- 外部スクリプト読み込み -->
  <script src="script.js"></script>
</body>
</html>
